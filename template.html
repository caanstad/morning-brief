<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Morgenbrief">
  <meta name="theme-color" content="#1a1a2e">
  <title>Morgenbrief</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --card: #ffffff;
      --ink: #1a1a2e;
      --muted: #6b6b7a;
      --accent: #c2410c;
      --border: #e5e2db;
      --error: #b91c1c;
      --error-bg: #fef2f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14141c;
        --card: #1f1f2e;
        --ink: #f0eee8;
        --muted: #9a9aaa;
        --accent: #fb923c;
        --border: #2d2d40;
        --error: #fca5a5;
        --error-bg: #3f1f1f;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      padding: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .updated {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .news-card, .weather-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    .articles {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .articles li {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .articles li:last-child { border-bottom: none; }
    .art-title {
      font-weight: 500;
      margin-bottom: 0.2rem;
    }
    .art-title a {
      color: var(--ink);
      text-decoration: none;
    }
    .art-title a:hover { text-decoration: underline; }
    .art-desc {
      font-size: 0.875rem;
      color: var(--muted);
    }
    .error {
      color: var(--error);
      background: var(--error-bg);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.875rem;
      margin: 0;
    }
    .today-strip {
      display: flex;
      overflow-x: auto;
      gap: 0.25rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .hour {
      min-width: 50px;
      text-align: center;
      padding: 0.25rem;
      font-size: 0.8rem;
    }
    .hour-time { color: var(--muted); }
    .hour-temp { font-weight: 600; font-size: 0.95rem; }
    .hour-rain { color: #3b82f6; font-size: 0.7rem; min-height: 1em; }
    table.forecast {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    table.forecast th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 0.4rem 0.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    table.forecast td {
      padding: 0.4rem 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    table.forecast tr:last-child td { border-bottom: none; }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>☀️ Morgenbrief</h1>
    <div class="updated">{{DATE}} — oppdatert {{UPDATED}}</div>
  </header>

  <h2>📰 Nyheter</h2>
  <div class="grid">
    {{NEWS}}
  </div>

  <h2>🌦 Vær</h2>
  <div class="grid">
    {{WEATHER}}
  </div>

  <footer>
    Nyheter via RSS · Vær via met.no · Generert av GitHub Actions
  </footer>
</body>
</html>
