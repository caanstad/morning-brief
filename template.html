<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Morgenbrief">
  <meta name="theme-color" content="#1a1a2e">
  <title>Morgenbrief</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --card: #ffffff;
      --ink: #1a1a2e;
      --muted: #6b6b7a;
      --accent: #c2410c;
      --border: #e5e2db;
      --error: #b91c1c;
      --error-bg: #fef2f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14141c;
        --card: #1f1f2e;
        --ink: #f0eee8;
        --muted: #9a9aaa;
        --accent: #fb923c;
        --border: #2d2d40;
        --error: #fca5a5;
        --error-bg: #3f1f1f;
      }
    }
    * { box-sizing: border-box; }

      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
