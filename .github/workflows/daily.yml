name: Daily morning brief

on:
  schedule:
    # GitHub Actions cron kan være forsinket 10-15+ min, så vi kjører litt tidligere.
    - cron: '0 5 * * *'    # 07:00 CEST (sommer) / 06:00 CET (vinter)
    - cron: '0 6 * * *'    # 08:00 CEST (sommer) / 07:00 CET (vinter)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'fetch_brief.py'
      - 'template.html'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate morning brief
        run: python fetch_brief.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update morning brief $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
